<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Profile Card</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <article class="profile-card">
    <img class="avatar" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS8oghbsuzggpkknQSSU-Ch_xep_9v3m6EeBQ&s" alt="Alex Morgan's avatar">

    <h1 class="user-name">Alex Morgan</h1>
    <p class="bio">Frontend Developer &amp; UI Designer</p>

    <section class="stats">
      <ul class="stats-list">
        <li><strong>12K</strong> Followers</li>
        <li><strong>450</strong> Following</li>
      </ul>
    </section>

    <button class="follow-btn" type="button">+Follow</button>
  </article>

</body>
</html>
